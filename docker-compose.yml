version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english
    ports: ["5432:5432"]
    volumes:
      - english_pg:/var/lib/postgresql/data
  api:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/english?sslmode=disable
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      PORT: 8080
    depends_on: [db]
    ports: ["8080:8080"]
volumes:
  english_pg: {}
